<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボードゲーム</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #e0e0e0; padding-top: 20px;
  position: relative;
  transition: background-color 0.5s;
}
/* Western table (chess, othello) */
body.theme-western {
  background-color: #5c3a1e;
  background-image:
    repeating-linear-gradient(95deg,
      transparent 0px, transparent 18px,
      rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 19px,
      transparent 19px, transparent 40px),
    repeating-linear-gradient(92deg,
      transparent 0px, transparent 30px,
      rgba(255,220,160,0.04) 30px, rgba(255,220,160,0.04) 31px,
      transparent 31px, transparent 55px),
    radial-gradient(ellipse at 30% 40%, rgba(80,50,20,0.5) 0%, transparent 40%),
    radial-gradient(ellipse at 75% 70%, rgba(90,55,25,0.4) 0%, transparent 35%),
    radial-gradient(ellipse at 50% 0%, rgba(255,230,180,0.12) 0%, transparent 60%),
    linear-gradient(180deg, #6b4426 0%, #5c3a1e 30%, #4a2e15 70%, #3d2410 100%);
  background-attachment: fixed;
}
/* Japanese table (shogi) — tatami + wooden low table */
body.theme-japanese {
  background-color: #a08a5c;
  background-image:
    /* Tatami weave pattern */
    repeating-linear-gradient(0deg,
      rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px,
      transparent 1px, transparent 4px),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px,
      transparent 1px, transparent 6px),
    /* Tatami color blocks */
    repeating-linear-gradient(0deg,
      #b89e6a 0px, #b89e6a 90px,
      #a08a5c 90px, #a08a5c 91px,
      #c4aa74 91px, #c4aa74 181px,
      #a08a5c 181px, #a08a5c 182px),
    /* Warm light */
    radial-gradient(ellipse at 50% 0%, rgba(255,240,200,0.15) 0%, transparent 50%);
  background-attachment: fixed;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    repeating-linear-gradient(88deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px);
  pointer-events: none; z-index: 0;
}
.container {
  text-align: center; display: inline-flex; flex-direction: column; align-items: center;
  max-width: 700px; width: 100%;
  position: relative; z-index: 1;
  padding: 24px 20px 30px;
  border-radius: 16px;
  transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
}
/* Western felt mat */
body.theme-western .container {
  background: linear-gradient(180deg, rgba(15,50,25,0.92) 0%, rgba(10,40,18,0.95) 100%);
  border: 3px solid rgba(80,60,30,0.6);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}
/* Japanese wooden tray/board surface */
body.theme-japanese .container {
  background: linear-gradient(180deg, #8b7240 0%, #7a6335 50%, #6b5530 100%);
  border: 4px solid #5a4420;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5),
    inset 0 2px 0 rgba(255,230,170,0.15),
    0 2px 0 #4a3818;
  border-radius: 8px;
}

/* Game Tabs */
#game-tabs {
  display: flex; justify-content: center; gap: 0; margin-bottom: 18px;
  background: linear-gradient(180deg, #0d1f3c, #0a1628);
  border-radius: 12px; overflow: hidden;
  border: 2px solid #1a4a7a;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
#game-tabs button {
  padding: 12px 28px; font-size: 1.05rem; font-weight: bold;
  background: transparent; color: #6688aa; border: none;
  cursor: pointer; transition: all 0.3s; position: relative;
  letter-spacing: 1px;
}
#game-tabs button:hover { color: #e0e0e0; background: rgba(255,255,255,0.08); }
#game-tabs button.active {
  color: #f6e47a; background: linear-gradient(180deg, #143868, #0f3460);
  text-shadow: 0 0 10px rgba(246,228,122,0.3);
}
#game-tabs button + button { border-left: 1px solid #1a3a5c; }
/* Japanese theme tab override */
body.theme-japanese #game-tabs {
  background: linear-gradient(180deg, #4a3a20, #3a2c18);
  border-color: #6b5530;
}
body.theme-japanese #game-tabs button { color: #a09070; }
body.theme-japanese #game-tabs button:hover { color: #e0d8c8; background: rgba(255,240,200,0.08); }
body.theme-japanese #game-tabs button.active {
  color: #f0d878; background: linear-gradient(180deg, #5a4828, #4a3a20);
}
body.theme-japanese #game-tabs button + button { border-left-color: #5a4828; }

/* Game Container */
#game-container {
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
}

/* Common styles used by all games */
.square {
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; user-select: none; position: relative;
  transition: background 0.15s;
}
.square.selected { background: #f6e47a !important; }
.square.last-move { background: rgba(155, 199, 0, 0.41) !important; }
.square.check { box-shadow: inset 0 0 16px 4px rgba(255,0,0,0.6); }
.square.thinking { pointer-events: none; }
.square.legal-move::after {
  content: ''; position: absolute; width: 20px; height: 20px;
  background: rgba(0,0,0,0.2); border-radius: 50%;
}
.square.legal-capture::after {
  content: ''; position: absolute; width: 62px; height: 62px;
  border: 4px solid rgba(0,0,0,0.2); border-radius: 50%;
  background: transparent;
}
.piece.move-anim { animation: pieceSlide 0.3s ease-out forwards; }
@keyframes pieceSlide {
  from { transform: translate(var(--dx), var(--dy)) scale(1.15); }
  to { transform: translate(0, 0) scale(1); }
}
.piece.capture-anim { animation: pieceCapture 0.35s ease-out forwards; }
@keyframes pieceCapture {
  0% { transform: translate(var(--dx), var(--dy)) scale(1.2); }
  50% { transform: translate(0, 0) scale(1.25); filter: drop-shadow(0 0 12px rgba(255,200,0,0.8)); }
  100% { transform: translate(0, 0) scale(1); }
}
.square.capture-flash { animation: captureFlash 0.4s ease-out; }
@keyframes captureFlash {
  0% { box-shadow: inset 0 0 0 0 rgba(255,150,0,0); }
  30% { box-shadow: inset 0 0 20px 8px rgba(255,150,0,0.5); }
  100% { box-shadow: none; }
}
.square.check-anim { animation: checkPulse 0.6s ease-in-out; }
@keyframes checkPulse {
  0% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); }
  30% { box-shadow: inset 0 0 24px 8px rgba(255,0,0,0.7); }
  60% { box-shadow: inset 0 0 12px 4px rgba(255,0,0,0.4); }
  100% { box-shadow: inset 0 0 16px 4px rgba(255,0,0,0.6); }
}
@keyframes thinking-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.thinking-indicator { animation: thinking-pulse 1s infinite; }
@keyframes timerWarn {
  0%,100% { box-shadow: 0 0 8px 2px rgba(255,0,0,0.6); }
  50% { box-shadow: 0 0 16px 4px rgba(255,0,0,0.9); }
}
/* Victory overlay */
.game-result-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.6);
  z-index: 50; border-radius: 12px;
  animation: resultOverlayIn 0.3s ease-out;
  pointer-events: none;
}
@keyframes resultOverlayIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.game-result-text {
  font-size: 2.5rem; font-weight: bold;
  color: #fff; text-align: center;
  text-shadow: 0 0 20px rgba(255,200,0,0.5), 0 2px 4px rgba(0,0,0,0.8);
  animation: resultTextIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  padding: 20px 40px;
  border-radius: 12px;
}
.game-result-text.win {
  background: radial-gradient(ellipse, rgba(255,200,0,0.2), transparent 70%);
}
.game-result-text.draw {
  color: #ccc;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}
@keyframes resultTextIn {
  0% { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
/* Confetti particles */
.confetti-particle {
  position: absolute; width: 8px; height: 8px;
  border-radius: 2px; pointer-events: none;
  animation: confettiFall var(--duration) ease-in forwards;
  opacity: 0.9;
}
@keyframes confettiFall {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
}
#mute-btn {
  position: fixed; top: 20px; right: 20px;
  font-size: 1.5rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
  color: #e0e0e0; border-radius: 50%; width: 44px; height: 44px;
  cursor: pointer; transition: all 0.2s; z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
#mute-btn:hover { background: rgba(0,0,0,0.5); }
</style>
</head>
<body>
<button id="mute-btn" onclick="toggleMute()">🔊</button>
<div class="container">
  <div id="game-tabs">
    <button onclick="switchGame('chess')" id="tab-chess">♔ チェス</button>
    <button onclick="switchGame('shogi')" id="tab-shogi">☗ 将棋</button>
    <button onclick="switchGame('othello')" id="tab-othello">⚫ オセロ</button>
  </div>
  <div id="game-container"></div>
</div>

<script src="chess.js"></script>
<script src="shogi.js"></script>
<script src="othello.js"></script>
<script>
// Sound system
let soundMuted = false;
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function toggleMute() {
  soundMuted = !soundMuted;
  document.getElementById('mute-btn').textContent = soundMuted ? '🔇' : '🔊';
}

// Helper: create noise buffer
function _noiseBuf(ctx, dur, vol) {
  const n = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * vol;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const g = ctx.createGain();
  src.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(vol, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  src.start(ctx.currentTime);
  src.stop(ctx.currentTime + dur);
}

// ── Chess: classic wooden piece on marble ──
function _chessMoveSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Wooden tap
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(800, t);
  o.frequency.exponentialRampToValueAtTime(300, t + 0.06);
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.start(t); o.stop(t + 0.1);
  _noiseBuf(ctx, 0.04, 0.06);
}
function _chessCaptureSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Impact thud
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(500, t);
  o.frequency.exponentialRampToValueAtTime(120, t + 0.12);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  o.start(t); o.stop(t + 0.18);
  // Clash
  const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sawtooth';
  o2.frequency.setValueAtTime(1200, t);
  o2.frequency.exponentialRampToValueAtTime(400, t + 0.08);
  g2.gain.setValueAtTime(0.08, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o2.start(t); o2.stop(t + 0.1);
  _noiseBuf(ctx, 0.06, 0.12);
}
function _chessCheckSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Dramatic two-tone
  [0, 0.12].forEach((dt, i) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(i === 0 ? 880 : 1100, t + dt);
    g.gain.setValueAtTime(0.08, t + dt);
    g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.15);
    o.start(t + dt); o.stop(t + dt + 0.15);
  });
}
function _chessWinSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Triumphant brass fanfare: C-E-G-C
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(f, t + i * 0.18);
    g.gain.setValueAtTime(0, t + i * 0.18);
    g.gain.linearRampToValueAtTime(0.1, t + i * 0.18 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.5);
    o.start(t + i * 0.18); o.stop(t + i * 0.18 + 0.5);
  });
}

// ── Shogi: tatami room, wood on wood ──
function _shogiMoveSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // パチッ — sharp wooden clack
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(2000, t);
  o.frequency.exponentialRampToValueAtTime(400, t + 0.03);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  o.start(t); o.stop(t + 0.08);
  // Resonance
  const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(250, t + 0.02);
  g2.gain.setValueAtTime(0.08, t + 0.02);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  o2.start(t + 0.02); o2.stop(t + 0.15);
}
function _shogiCaptureSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // バシッ — heavy slam
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(2500, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.04);
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.start(t); o.stop(t + 0.1);
  // Deep thud
  const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(150, t);
  o2.frequency.exponentialRampToValueAtTime(80, t + 0.15);
  g2.gain.setValueAtTime(0.15, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o2.start(t); o2.stop(t + 0.2);
  _noiseBuf(ctx, 0.05, 0.1);
}
function _shogiDropSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // カチッ — lighter click for drop
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(3000, t);
  o.frequency.exponentialRampToValueAtTime(600, t + 0.025);
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  o.start(t); o.stop(t + 0.06);
  const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(350, t + 0.015);
  g2.gain.setValueAtTime(0.06, t + 0.015);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o2.start(t + 0.015); o2.stop(t + 0.1);
}
function _shogiCheckSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // 太鼓風の王手警告
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(200, t);
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  o.start(t); o.stop(t + 0.3);
  // Second beat
  const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(250, t + 0.2);
  g2.gain.setValueAtTime(0.15, t + 0.2);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  o2.start(t + 0.2); o2.stop(t + 0.45);
  _noiseBuf(ctx, 0.08, 0.08);
}
function _shogiWinSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // 和風 — pentatonic scale (D-E-G-A-D)
  [294, 330, 392, 440, 587].forEach((f, i) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t + i * 0.2);
    g.gain.setValueAtTime(0, t + i * 0.2);
    g.gain.linearRampToValueAtTime(0.12, t + i * 0.2 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.2 + 0.55);
    o.start(t + i * 0.2); o.stop(t + i * 0.2 + 0.55);
  });
}

// ── Othello: smooth stone on board ──
function _othelloStoneSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // カツン — stone tap
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(1200, t);
  o.frequency.exponentialRampToValueAtTime(350, t + 0.04);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  o.start(t); o.stop(t + 0.08);
  _noiseBuf(ctx, 0.03, 0.05);
}
function _othelloFlipSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // パラパラ — cascading flip
  for (let i = 0; i < 3; i++) {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    const dt = i * 0.06;
    o.frequency.setValueAtTime(900 + i * 200, t + dt);
    o.frequency.exponentialRampToValueAtTime(400, t + dt + 0.04);
    g.gain.setValueAtTime(0.06, t + dt);
    g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.06);
    o.start(t + dt); o.stop(t + dt + 0.06);
  }
}
function _othelloWinSound() {
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Clean major chord
  [440, 554, 659].forEach(f => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.1, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    o.start(t); o.stop(t + 0.8);
  });
  // Resolve up
  const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(880, t + 0.4);
  g2.gain.setValueAtTime(0, t + 0.4);
  g2.gain.linearRampToValueAtTime(0.12, t + 0.45);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
  o2.start(t + 0.4); o2.stop(t + 1.0);
}

// Common draw sound
function _drawSound() {
  if (soundMuted) return;
  const ctx = getAudioCtx(); const t = ctx.currentTime;
  // Minor descend
  [392, 370, 330].forEach((f, i) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t + i * 0.2);
    g.gain.setValueAtTime(0, t + i * 0.2);
    g.gain.linearRampToValueAtTime(0.1, t + i * 0.2 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.2 + 0.45);
    o.start(t + i * 0.2); o.stop(t + i * 0.2 + 0.45);
  });
}

// ── Dispatcher functions (called by game JS files) ──
function playMoveSound() {
  if (soundMuted) return;
  if (currentGame === 'shogi') _shogiMoveSound();
  else _chessMoveSound(); // chess
}
function playCaptureSound() {
  if (soundMuted) return;
  if (currentGame === 'shogi') _shogiCaptureSound();
  else if (currentGame === 'othello') _othelloFlipSound();
  else _chessCaptureSound();
}
function playCheckSound() {
  if (soundMuted) return;
  if (currentGame === 'shogi') _shogiCheckSound();
  else _chessCheckSound();
}
function playWinSound() {
  if (soundMuted) return;
  if (currentGame === 'shogi') _shogiWinSound();
  else if (currentGame === 'othello') _othelloWinSound();
  else _chessWinSound();
}
function playDrawSound() { _drawSound(); }
function playStoneSound() {
  if (soundMuted) return;
  _othelloStoneSound();
}
function playDropSound() {
  if (soundMuted) return;
  _shogiDropSound();
}

let currentGame = null;
const games = {
  chess: ChessGame,
  shogi: ShogiGame,
  othello: OthelloGame
};

function switchGame(name) {
  // Destroy current game
  if (currentGame && games[currentGame]) {
    games[currentGame].destroy();
  }

  // Update tabs
  document.querySelectorAll('#game-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  // Switch table theme
  const theme = name === 'shogi' ? 'theme-japanese' : 'theme-western';
  document.body.className = theme;

  // Init new game
  currentGame = name;
  const container = document.getElementById('game-container');
  container.innerHTML = '';
  games[name].init(container);
}

// Start with chess
switchGame('chess');
</script>
