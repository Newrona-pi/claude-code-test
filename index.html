<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボードゲーム</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #e0e0e0; padding-top: 20px;
  position: relative;
  transition: background-color 0.5s;
}
/* Western table (chess, othello) */
body.theme-western {
  background-color: #5c3a1e;
  background-image:
    repeating-linear-gradient(95deg,
      transparent 0px, transparent 18px,
      rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 19px,
      transparent 19px, transparent 40px),
    repeating-linear-gradient(92deg,
      transparent 0px, transparent 30px,
      rgba(255,220,160,0.04) 30px, rgba(255,220,160,0.04) 31px,
      transparent 31px, transparent 55px),
    radial-gradient(ellipse at 30% 40%, rgba(80,50,20,0.5) 0%, transparent 40%),
    radial-gradient(ellipse at 75% 70%, rgba(90,55,25,0.4) 0%, transparent 35%),
    radial-gradient(ellipse at 50% 0%, rgba(255,230,180,0.12) 0%, transparent 60%),
    linear-gradient(180deg, #6b4426 0%, #5c3a1e 30%, #4a2e15 70%, #3d2410 100%);
  background-attachment: fixed;
}
/* Japanese table (shogi) — tatami + wooden low table */
body.theme-japanese {
  background-color: #a08a5c;
  background-image:
    /* Tatami weave pattern */
    repeating-linear-gradient(0deg,
      rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px,
      transparent 1px, transparent 4px),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px,
      transparent 1px, transparent 6px),
    /* Tatami color blocks */
    repeating-linear-gradient(0deg,
      #b89e6a 0px, #b89e6a 90px,
      #a08a5c 90px, #a08a5c 91px,
      #c4aa74 91px, #c4aa74 181px,
      #a08a5c 181px, #a08a5c 182px),
    /* Warm light */
    radial-gradient(ellipse at 50% 0%, rgba(255,240,200,0.15) 0%, transparent 50%);
  background-attachment: fixed;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    repeating-linear-gradient(88deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px);
  pointer-events: none; z-index: 0;
}
.container {
  text-align: center; display: inline-flex; flex-direction: column; align-items: center;
  max-width: 700px; width: 100%;
  position: relative; z-index: 1;
  padding: 24px 20px 30px;
  border-radius: 16px;
  transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
}
/* Western felt mat */
body.theme-western .container {
  background: linear-gradient(180deg, rgba(15,50,25,0.92) 0%, rgba(10,40,18,0.95) 100%);
  border: 3px solid rgba(80,60,30,0.6);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}
/* Japanese wooden tray/board surface */
body.theme-japanese .container {
  background: linear-gradient(180deg, #8b7240 0%, #7a6335 50%, #6b5530 100%);
  border: 4px solid #5a4420;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5),
    inset 0 2px 0 rgba(255,230,170,0.15),
    0 2px 0 #4a3818;
  border-radius: 8px;
}

/* Game Tabs */
#game-tabs {
  display: flex; justify-content: center; gap: 0; margin-bottom: 18px;
  background: linear-gradient(180deg, #0d1f3c, #0a1628);
  border-radius: 12px; overflow: hidden;
  border: 2px solid #1a4a7a;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
#game-tabs button {
  padding: 12px 28px; font-size: 1.05rem; font-weight: bold;
  background: transparent; color: #6688aa; border: none;
  cursor: pointer; transition: all 0.3s; position: relative;
  letter-spacing: 1px;
}
#game-tabs button:hover { color: #e0e0e0; background: rgba(255,255,255,0.08); }
#game-tabs button.active {
  color: #f6e47a; background: linear-gradient(180deg, #143868, #0f3460);
  text-shadow: 0 0 10px rgba(246,228,122,0.3);
}
#game-tabs button + button { border-left: 1px solid #1a3a5c; }
/* Japanese theme tab override */
body.theme-japanese #game-tabs {
  background: linear-gradient(180deg, #4a3a20, #3a2c18);
  border-color: #6b5530;
}
body.theme-japanese #game-tabs button { color: #a09070; }
body.theme-japanese #game-tabs button:hover { color: #e0d8c8; background: rgba(255,240,200,0.08); }
body.theme-japanese #game-tabs button.active {
  color: #f0d878; background: linear-gradient(180deg, #5a4828, #4a3a20);
}
body.theme-japanese #game-tabs button + button { border-left-color: #5a4828; }

/* Game Container */
#game-container {
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
}

/* Common styles used by all games */
.square {
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; user-select: none; position: relative;
  transition: background 0.15s;
}
.square.selected { background: #f6e47a !important; }
.square.last-move { background: rgba(155, 199, 0, 0.41) !important; }
.square.check { box-shadow: inset 0 0 16px 4px rgba(255,0,0,0.6); }
.square.thinking { pointer-events: none; }
.square.legal-move::after {
  content: ''; position: absolute; width: 20px; height: 20px;
  background: rgba(0,0,0,0.2); border-radius: 50%;
}
.square.legal-capture::after {
  content: ''; position: absolute; width: 62px; height: 62px;
  border: 4px solid rgba(0,0,0,0.2); border-radius: 50%;
  background: transparent;
}
.piece.move-anim { animation: pieceSlide 0.3s ease-out forwards; }
@keyframes pieceSlide {
  from { transform: translate(var(--dx), var(--dy)) scale(1.15); }
  to { transform: translate(0, 0) scale(1); }
}
.piece.capture-anim { animation: pieceCapture 0.35s ease-out forwards; }
@keyframes pieceCapture {
  0% { transform: translate(var(--dx), var(--dy)) scale(1.2); }
  50% { transform: translate(0, 0) scale(1.25); filter: drop-shadow(0 0 12px rgba(255,200,0,0.8)); }
  100% { transform: translate(0, 0) scale(1); }
}
.square.capture-flash { animation: captureFlash 0.4s ease-out; }
@keyframes captureFlash {
  0% { box-shadow: inset 0 0 0 0 rgba(255,150,0,0); }
  30% { box-shadow: inset 0 0 20px 8px rgba(255,150,0,0.5); }
  100% { box-shadow: none; }
}
.square.check-anim { animation: checkPulse 0.6s ease-in-out; }
@keyframes checkPulse {
  0% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); }
  30% { box-shadow: inset 0 0 24px 8px rgba(255,0,0,0.7); }
  60% { box-shadow: inset 0 0 12px 4px rgba(255,0,0,0.4); }
  100% { box-shadow: inset 0 0 16px 4px rgba(255,0,0,0.6); }
}
@keyframes thinking-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.thinking-indicator { animation: thinking-pulse 1s infinite; }
@keyframes timerWarn {
  0%,100% { box-shadow: 0 0 8px 2px rgba(255,0,0,0.6); }
  50% { box-shadow: 0 0 16px 4px rgba(255,0,0,0.9); }
}
</style>
</head>
<body>
<div class="container">
  <div id="game-tabs">
    <button onclick="switchGame('chess')" id="tab-chess">♔ チェス</button>
    <button onclick="switchGame('shogi')" id="tab-shogi">☗ 将棋</button>
    <button onclick="switchGame('othello')" id="tab-othello">⚫ オセロ</button>
  </div>
  <div id="game-container"></div>
</div>

<script src="chess.js"></script>
<script src="shogi.js"></script>
<script src="othello.js"></script>
<script>
let currentGame = null;
const games = {
  chess: ChessGame,
  shogi: ShogiGame,
  othello: OthelloGame
};

function switchGame(name) {
  // Destroy current game
  if (currentGame && games[currentGame]) {
    games[currentGame].destroy();
  }

  // Update tabs
  document.querySelectorAll('#game-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  // Switch table theme
  const theme = name === 'shogi' ? 'theme-japanese' : 'theme-western';
  document.body.className = theme;

  // Init new game
  currentGame = name;
  const container = document.getElementById('game-container');
  container.innerHTML = '';
  games[name].init(container);
}

// Start with chess
switchGame('chess');
</script>
</body>
</html>
