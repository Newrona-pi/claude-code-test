<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ボードゲーム</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
  color: #e0e0e0; padding-top: 20px;
}
.container {
  text-align: center; display: inline-flex; flex-direction: column; align-items: center;
  max-width: 700px; width: 100%;
}

/* Game Tabs */
#game-tabs {
  display: flex; justify-content: center; gap: 0; margin-bottom: 16px;
  background: #0a1628; border-radius: 10px; overflow: hidden;
  border: 2px solid #0f3460;
}
#game-tabs button {
  padding: 10px 24px; font-size: 1rem; font-weight: bold;
  background: transparent; color: #8899aa; border: none;
  cursor: pointer; transition: all 0.25s; position: relative;
  letter-spacing: 1px;
}
#game-tabs button:hover { color: #e0e0e0; background: rgba(255,255,255,0.05); }
#game-tabs button.active {
  color: #f6e47a; background: #0f3460;
}
#game-tabs button + button { border-left: 1px solid #0f3460; }

/* Game Container */
#game-container {
  width: 100%;
}

/* Common styles used by all games */
.square {
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; user-select: none; position: relative;
  transition: background 0.15s;
}
.square.selected { background: #f6e47a !important; }
.square.last-move { background: rgba(155, 199, 0, 0.41) !important; }
.square.check { box-shadow: inset 0 0 16px 4px rgba(255,0,0,0.6); }
.square.thinking { pointer-events: none; }
.square.legal-move::after {
  content: ''; position: absolute; width: 20px; height: 20px;
  background: rgba(0,0,0,0.2); border-radius: 50%;
}
.square.legal-capture::after {
  content: ''; position: absolute; width: 62px; height: 62px;
  border: 4px solid rgba(0,0,0,0.2); border-radius: 50%;
  background: transparent;
}
.piece.move-anim { animation: pieceSlide 0.3s ease-out forwards; }
@keyframes pieceSlide {
  from { transform: translate(var(--dx), var(--dy)) scale(1.15); }
  to { transform: translate(0, 0) scale(1); }
}
.piece.capture-anim { animation: pieceCapture 0.35s ease-out forwards; }
@keyframes pieceCapture {
  0% { transform: translate(var(--dx), var(--dy)) scale(1.2); }
  50% { transform: translate(0, 0) scale(1.25); filter: drop-shadow(0 0 12px rgba(255,200,0,0.8)); }
  100% { transform: translate(0, 0) scale(1); }
}
.square.capture-flash { animation: captureFlash 0.4s ease-out; }
@keyframes captureFlash {
  0% { box-shadow: inset 0 0 0 0 rgba(255,150,0,0); }
  30% { box-shadow: inset 0 0 20px 8px rgba(255,150,0,0.5); }
  100% { box-shadow: none; }
}
.square.check-anim { animation: checkPulse 0.6s ease-in-out; }
@keyframes checkPulse {
  0% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); }
  30% { box-shadow: inset 0 0 24px 8px rgba(255,0,0,0.7); }
  60% { box-shadow: inset 0 0 12px 4px rgba(255,0,0,0.4); }
  100% { box-shadow: inset 0 0 16px 4px rgba(255,0,0,0.6); }
}
@keyframes thinking-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.thinking-indicator { animation: thinking-pulse 1s infinite; }
@keyframes timerWarn {
  0%,100% { box-shadow: 0 0 8px 2px rgba(255,0,0,0.6); }
  50% { box-shadow: 0 0 16px 4px rgba(255,0,0,0.9); }
}
</style>
</head>
<body>
<div class="container">
  <div id="game-tabs">
    <button onclick="switchGame('chess')" id="tab-chess">♔ チェス</button>
    <button onclick="switchGame('shogi')" id="tab-shogi">☗ 将棋</button>
    <button onclick="switchGame('othello')" id="tab-othello">⚫ オセロ</button>
  </div>
  <div id="game-container"></div>
</div>

<script src="chess.js"></script>
<script src="shogi.js"></script>
<script src="othello.js"></script>
<script>
let currentGame = null;
const games = {
  chess: ChessGame,
  shogi: ShogiGame,
  othello: OthelloGame
};

function switchGame(name) {
  // Destroy current game
  if (currentGame && games[currentGame]) {
    games[currentGame].destroy();
  }

  // Update tabs
  document.querySelectorAll('#game-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  // Init new game
  currentGame = name;
  const container = document.getElementById('game-container');
  container.innerHTML = '';
  games[name].init(container);
}

// Start with chess
switchGame('chess');
</script>
</body>
</html>
